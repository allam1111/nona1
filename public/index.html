<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>علام AI | المساعد الصوتي المصري</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="blob"></div>
    
    <div class="container">
        <div class="logo-container">
            <h1>علام AI</h1>
            <p class="tagline">مساعدك الشخصي المتطور.. بيفهمك من غير كلام</p>
        </div>

        <div class="wave-container">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>

        <div class="features">
            <span class="feature-tag">ذكاء اصطناعي</span>
            <span class="feature-tag">لهجة مصرية</span>
            <span class="feature-tag">تحكم صوتي</span>
        </div>

        <a href="https://github.com/allam1111/youssef/releases/download/v1.0.0/app-debug.apk" class="download-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            تحميل التطبيق الآن (APK)
        </a>

        <div class="footer-info">
            الإصدار 1.0.0 | آمن وموثوق 100%
        </div>
    </div>

    <script>
        // Subtle mouse tracking effect
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('.container');
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>
</body>
</html>
